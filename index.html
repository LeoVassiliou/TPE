<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leo Vassiliou</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&family=Raleway:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:    #0e0c09;
  --bg2:   #141209;
  --ink:   #f0ead8;
  --ink2:  #9e9890;
  --ink3:  #4a4740;
  --gold:  #c8a05a;
  --gold2: #e8c07a;
  --gold3: #7a5c28;
  --serif: 'Cormorant Garamond', Georgia, serif;
  --sans:  'Raleway', sans-serif;
}

html { font-size: 18px; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--serif);
  min-height: 100vh;
  overflow-x: hidden;
}

/* grain */
body::before {
  content: '';
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 1000;
  opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 180px;
}

/* ambient glow */
.bg-glow {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.bg-glow::before {
  content: '';
  position: absolute;
  width: 900px; height: 900px;
  top: -260px; left: 50%;
  transform: translateX(-50%);
  background: radial-gradient(circle, rgba(200,160,90,0.065) 0%, transparent 62%);
  animation: breathe 9s ease-in-out infinite;
}
@keyframes breathe {
  0%,100% { opacity:.7; transform:translateX(-50%) scale(1); }
  50%      { opacity:1;  transform:translateX(-50%) scale(1.12); }
}

/* cursor glow */
#cg {
  position: fixed;
  width: 340px; height: 340px;
  pointer-events: none;
  z-index: 2;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(200,160,90,0.05) 0%, transparent 70%);
  transform: translate(-50%,-50%);
  opacity: 0;
  transition: opacity .4s;
}

/* ── LAYOUT ── */
.site {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 5rem 2rem 7rem;
}

/* ── HEADER ── */
.hd {
  text-align: center;
  margin-bottom: 7rem;
  opacity: 0;
  transform: translateY(20px);
  animation: up 1.3s cubic-bezier(.16,1,.3,1) .05s forwards;
}
.hd-eyebrow {
  font-family: var(--sans);
  font-size: .52rem;
  font-weight: 300;
  letter-spacing: .5em;
  text-transform: uppercase;
  color: var(--gold);
  opacity: .7;
  margin-bottom: 1.6rem;
}
.hd-name {
  font-family: var(--serif);
  font-weight: 300;
  font-size: clamp(3.2rem, 8vw, 6.4rem);
  line-height: .93;
  letter-spacing: -.01em;
  color: var(--ink);
}
.hd-name em {
  font-style: italic;
  color: var(--gold);
}
.hd-rule {
  width: 36px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 2.2rem auto 0;
  opacity: .5;
}

/* ── CARDS ── */
.grid {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  width: 100%;
  max-width: 880px;
  gap: 0;
  border: 1px solid rgba(200,160,90,.1);
}

.card {
  position: relative;
  display: block;
  text-decoration: none;
  padding: 3.4rem 2.8rem 3rem;
  overflow: hidden;
  background: rgba(255,255,255,.014);
  border-right: 1px solid rgba(200,160,90,.1);
  transition: background .45s;
  opacity: 0;
  transform: translateY(24px);
}
.card:last-child { border-right: none; }
.card:nth-child(1) { animation: up 1s cubic-bezier(.16,1,.3,1) .45s forwards; }
.card:nth-child(2) { animation: up 1s cubic-bezier(.16,1,.3,1) .6s  forwards; }
.card:nth-child(3) { animation: up 1s cubic-bezier(.16,1,.3,1) .75s forwards; }

/* corner bracket */
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 28px; height: 28px;
  border-top: 1px solid rgba(200,160,90,.25);
  border-left: 1px solid rgba(200,160,90,.25);
  transition: width .4s cubic-bezier(.16,1,.3,1),
              height .4s cubic-bezier(.16,1,.3,1),
              border-color .4s;
}
/* bottom fill on hover */
.card::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(200,160,90,.04) 0%, transparent 60%);
  opacity: 0;
  transition: opacity .5s;
}
.card:hover { background: rgba(200,160,90,.03); }
.card:hover::before { width: 52px; height: 52px; border-color: var(--gold); }
.card:hover::after  { opacity: 1; }

/* number */
.c-n {
  font-family: var(--sans);
  font-size: .48rem;
  font-weight: 300;
  letter-spacing: .35em;
  text-transform: uppercase;
  color: var(--gold3);
  display: block;
  margin-bottom: 2.8rem;
  transition: color .3s;
}
.card:hover .c-n { color: var(--gold); }

/* symbol */
.c-sym {
  display: block;
  font-size: 1.5rem;
  line-height: 1;
  color: var(--gold);
  opacity: .45;
  margin-bottom: 1.5rem;
  transition: opacity .35s, transform .5s cubic-bezier(.16,1,.3,1);
}
.card:hover .c-sym { opacity: .85; transform: translateY(-4px); }

/* title */
.c-title {
  display: block;
  font-family: var(--serif);
  font-weight: 400;
  font-size: 1.5rem;
  line-height: 1.18;
  color: var(--ink);
  margin-bottom: .75rem;
  transition: color .3s;
}
.card:hover .c-title { color: var(--gold2); }

/* description */
.c-desc {
  display: block;
  font-family: var(--sans);
  font-size: .58rem;
  font-weight: 300;
  letter-spacing: .1em;
  line-height: 1.8;
  color: var(--ink3);
  transition: color .3s;
}
.card:hover .c-desc { color: var(--ink2); }

/* arrow */
.c-arrow {
  position: absolute;
  bottom: 2.4rem;
  right: 2.4rem;
  font-size: .8rem;
  color: var(--gold);
  opacity: 0;
  transform: translate(-5px, 5px);
  transition: opacity .3s, transform .4s cubic-bezier(.16,1,.3,1);
}
.card:hover .c-arrow { opacity: 1; transform: translate(0,0); }

/* ── FOOTER ── */
.ft {
  margin-top: 5.5rem;
  font-family: var(--sans);
  font-size: .5rem;
  font-weight: 300;
  letter-spacing: .32em;
  text-transform: uppercase;
  color: var(--ink3);
  text-align: center;
  opacity: 0;
  animation: up .8s ease 1.1s forwards;
}
.ft span { display: inline-block; width: 3px; height: 3px; background: var(--gold3); border-radius: 50%; vertical-align: middle; margin: 0 1em; }

/* ── ANIM ── */
@keyframes up {
  to { opacity:1; transform:translateY(0); }
}

/* ── RESPONSIVE ── */
@media (max-width: 680px) {
  .grid { grid-template-columns: 1fr; border-right: 1px solid rgba(200,160,90,.1); }
  .card { border-right: none; border-bottom: 1px solid rgba(200,160,90,.1); padding: 2.4rem 2rem; }
  .card:last-child { border-bottom: none; }
  .hd { margin-bottom: 4rem; }
}
@media (min-width:681px) and (max-width:860px) {
  .grid { max-width: 700px; }
  .card { padding: 2.8rem 2.2rem; }
}
</style>
</head>
<body>

<div class="bg-glow"></div>
<div id="cg"></div>

<div class="site">

  <header class="hd">
    <p class="hd-eyebrow">leovassiliou.co.uk</p>
    <h1 class="hd-name">Leo <em>Vassiliou</em></h1>
    <div class="hd-rule"></div>
  </header>

  <nav class="grid">

    <a href="dream.html" class="card">
      <span class="c-n">01</span>
      <span class="c-sym">◈</span>
      <span class="c-title">Portfolio</span>
      <span class="c-desc">The ideal version.<br>What I'm building toward.</span>
      <span class="c-arrow">↗</span>
    </a>

    <a href="v2.html" class="card">
      <span class="c-n">02</span>
      <span class="c-sym">⟁</span>
      <span class="c-title">Theism Engine</span>
      <span class="c-desc">A probability tool for<br>the existence of God.</span>
      <span class="c-arrow">↗</span>
    </a>

    <a href="writings.html" class="card">
      <span class="c-n">03</span>
      <span class="c-sym">✦</span>
      <span class="c-title">Writings</span>
      <span class="c-desc">Essays, talks, and<br>collected notes.</span>
      <span class="c-arrow">↗</span>
    </a>

  </nav>

  <footer class="ft">
    Leo Vassiliou <span></span> <span id="yr"></span>
  </footer>

</div>

<script>
document.getElementById('yr').textContent = new Date().getFullYear();

// cursor glow
const cg = document.getElementById('cg');
let mx=-999,my=-999,cx=-999,cy=-999,vis=false;
document.addEventListener('mousemove', e=>{
  mx=e.clientX; my=e.clientY;
  if(!vis){ cg.style.opacity='1'; vis=true; }
});
document.addEventListener('mouseleave',()=>{ cg.style.opacity='0'; vis=false; });
(function loop(){
  cx+=(mx-cx)*.08; cy+=(my-cy)*.08;
  cg.style.left=cx+'px'; cg.style.top=cy+'px';
  requestAnimationFrame(loop);
})();

// card 3d tilt
document.querySelectorAll('.card').forEach(c=>{
  c.addEventListener('mousemove', e=>{
    const r=c.getBoundingClientRect();
    const x=(e.clientX-r.left)/r.width-.5;
    const y=(e.clientY-r.top)/r.height-.5;
    c.style.transform=`perspective(700px) rotateY(${x*5}deg) rotateX(${-y*4}deg) translateZ(6px)`;
    c.style.transition='transform .08s, background .45s';
  });
  c.addEventListener('mouseleave',()=>{
    c.style.transform='';
    c.style.transition='transform .7s cubic-bezier(.16,1,.3,1), background .45s';
  });
});
</script>
</body>
</html>
