<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leo Vassiliou — Writings</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:          #1c1814;
  --ink-muted:    #6b6560;
  --ink-faint:    #bdb8b0;
  --parchment:    #faf8f4;
  --parchment-2:  #f2ede4;
  --gold:         #b8914a;
  --gold-light:   #cfa96a;
  --rule:         #e0dbd0;
  --serif:        'Cormorant Garamond', Georgia, serif;
  --body:         'Crimson Pro', Georgia, serif;
  --sans:         'Raleway', sans-serif;
}
@media (prefers-color-scheme: dark) {
  :root {
    --ink:         #eae5db;
    --ink-muted:   #9b9590;
    --ink-faint:   #4a4540;
    --parchment:   #17150f;
    --parchment-2: #1f1c15;
    --gold:        #c8a05a;
    --gold-light:  #dab870;
    --rule:        #2c2920;
  }
}

html { font-size: 18px; scroll-behavior: smooth; }
body {
  background: var(--parchment);
  color: var(--ink);
  font-family: var(--body);
  line-height: 1.8;
  min-height: 100vh;
}

/* ── HEADER ─────────────────────────────────────────────── */
.site-header {
  text-align: center;
  padding: 5.5rem 2rem 3.5rem;
  border-bottom: 1px solid var(--rule);
}
.header-rule {
  width: 1px; height: 3.5rem;
  background: var(--gold);
  margin: 0 auto 2.5rem;
  opacity: 0.5;
}
.site-name {
  font-family: var(--serif);
  font-weight: 300;
  font-size: 2.8rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}
.site-tagline {
  font-family: var(--sans);
  font-size: 0.6rem;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--ink-muted);
  margin-top: 0.9rem;
  font-weight: 400;
}

/* ── CONTAINER ──────────────────────────────────────────── */
.wrap { max-width: 1060px; margin: 0 auto; padding: 0 2.5rem; }

/* ── INDEX ──────────────────────────────────────────────── */
#indexView { display: block; }
#readerView { display: none; }

.index-meta {
  padding: 2rem 0 1.5rem;
  border-bottom: 1px solid var(--rule);
  margin-bottom: 3rem;
  font-family: var(--sans);
  font-size: 0.6rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--ink-muted);
}

.piece-list { list-style: none; }
.piece-row {
  display: grid;
  grid-template-columns: 52px 1fr 24px;
  align-items: center;
  gap: 0 2rem;
  padding: 1.5rem 0;
  border-bottom: 1px solid var(--rule);
  cursor: pointer;
  transition: background 0.15s;
}
.piece-row:hover .piece-title { color: var(--gold); }
.piece-row:hover .arrow { opacity: 1; transform: translateX(5px); }

.piece-n {
  font-family: var(--serif);
  font-style: italic;
  font-size: 0.78rem;
  color: var(--ink-faint);
  letter-spacing: 0.05em;
  font-weight: 300;
}
.piece-info { min-width: 0; }
.piece-title {
  font-family: var(--serif);
  font-size: 1.3rem;
  font-weight: 400;
  line-height: 1.35;
  transition: color 0.2s;
}
.piece-excerpt {
  font-size: 0.83rem;
  color: var(--ink-muted);
  margin-top: 0.25rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.piece-type {
  font-family: var(--sans);
  font-size: 0.5rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--ink-faint);
  margin-top: 0.2rem;
}
.arrow {
  color: var(--gold);
  font-size: 1.1rem;
  opacity: 0;
  transition: opacity 0.2s, transform 0.2s;
}

/* loading / error states */
.state-msg {
  padding: 5rem 2rem;
  text-align: center;
  font-family: var(--serif);
  font-style: italic;
  font-size: 1.15rem;
  color: var(--ink-muted);
}

/* ── READER ──────────────────────────────────────────────── */
.reader-top {
  padding: 4rem 0 2.5rem;
  border-bottom: 1px solid var(--rule);
  margin-bottom: 0;
}
.back {
  background: none; border: none;
  display: inline-flex; align-items: center; gap: 0.55rem;
  font-family: var(--sans);
  font-size: 0.58rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ink-muted);
  cursor: pointer;
  padding: 0;
  margin-bottom: 2.8rem;
  transition: color 0.2s;
}
.back:hover { color: var(--gold); }
.back::before { content: '←'; font-family: var(--serif); font-size: 1.05rem; }

.reader-n {
  font-family: var(--serif);
  font-style: italic;
  font-size: 0.85rem;
  color: var(--gold);
  margin-bottom: 0.7rem;
}
.reader-title {
  font-family: var(--serif);
  font-weight: 300;
  font-size: 3rem;
  line-height: 1.12;
  max-width: 720px;
}

/* loading spinner inside reader */
.reader-loading {
  padding: 4rem 0;
  font-family: var(--serif);
  font-style: italic;
  color: var(--ink-muted);
  font-size: 1rem;
}

/* ── PROSE — plain text ──────────────────────────────────── */
.prose {
  max-width: 660px;
  padding: 3.5rem 0 7rem;
  font-size: 1.1rem;
  line-height: 1.88;
}
.prose p { margin-bottom: 1.45em; }
.prose p:last-child { margin-bottom: 0; }

/* ── PROSE — rich (docx) ─────────────────────────────────── */
.prose-rich {
  max-width: 660px;
  padding: 3.5rem 0 7rem;
  font-size: 1.08rem;
  line-height: 1.85;
}
.prose-rich > * + * { margin-top: 1.1em; }

.prose-rich p { margin-bottom: 0; }

.prose-rich h1 {
  font-family: var(--serif);
  font-weight: 400;
  font-size: 2.05rem;
  line-height: 1.18;
  margin: 2.4em 0 0.5em;
  color: var(--ink);
}
.prose-rich h2 {
  font-family: var(--serif);
  font-weight: 400;
  font-size: 1.55rem;
  line-height: 1.22;
  margin: 2.1em 0 0.45em;
  color: var(--ink);
}
.prose-rich h3 {
  font-family: var(--serif);
  font-weight: 500;
  font-size: 1.2rem;
  margin: 1.9em 0 0.4em;
  color: var(--ink);
}
.prose-rich h4, .prose-rich h5, .prose-rich h6 {
  font-family: var(--sans);
  font-weight: 500;
  font-size: 0.72rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  margin: 1.6em 0 0.35em;
  color: var(--ink-muted);
}
/* Bold paragraphs that act as section headers in the docx */
.prose-rich p:has(> strong:only-child),
.prose-rich p strong:only-child {
  display: block;
}

.prose-rich strong { font-weight: 600; }
.prose-rich em     { font-style: italic; }

.prose-rich ul {
  list-style: none;
  margin: 0.6em 0 1em;
  padding: 0;
}
.prose-rich ul li {
  padding-left: 1.5em;
  position: relative;
  margin-bottom: 0.35em;
  line-height: 1.75;
}
.prose-rich ul li::before {
  content: '—';
  position: absolute; left: 0;
  color: var(--gold);
  font-family: var(--serif);
}
.prose-rich ol {
  margin: 0.6em 0 1em;
  padding-left: 1.6em;
}
.prose-rich ol li {
  margin-bottom: 0.35em;
  padding-left: 0.3em;
  line-height: 1.75;
}

/* nested lists */
.prose-rich ul ul,
.prose-rich ol ul,
.prose-rich ul ol,
.prose-rich ol ol { margin: 0.3em 0 0.3em 1.2em; }

.prose-rich blockquote {
  border-left: 2px solid var(--gold);
  margin: 1.6em 0;
  padding: 0.4em 0 0.4em 1.4em;
  color: var(--ink-muted);
  font-style: italic;
}
.prose-rich table {
  width: 100%;
  border-collapse: collapse;
  margin: 1.6em 0;
  font-size: 0.93rem;
}
.prose-rich th {
  font-family: var(--sans);
  font-size: 0.58rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--ink-muted);
  border-bottom: 1px solid var(--rule);
  padding: 0.45rem 0.7rem;
  text-align: left;
  font-weight: 400;
}
.prose-rich td {
  border-bottom: 1px solid var(--rule);
  padding: 0.55rem 0.7rem;
  vertical-align: top;
}
.prose-rich a {
  color: var(--gold);
  text-decoration: underline;
  text-underline-offset: 2px;
}
.prose-rich hr {
  border: none;
  border-top: 1px solid var(--rule);
  margin: 2.8em 0;
}
/* section breaks inside the talk (bold-only paragraphs) */
.prose-rich p:has(> strong:only-child) {
  font-family: var(--serif);
  font-size: 1.18rem;
  margin-top: 2em;
  margin-bottom: 0.3em;
  font-weight: 500;
}

/* ── FOOTER ──────────────────────────────────────────────── */
footer {
  border-top: 1px solid var(--rule);
  text-align: center;
  padding: 2.5rem;
  font-family: var(--sans);
  font-size: 0.55rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ink-faint);
}

@media (max-width: 620px) {
  html { font-size: 16px; }
  .site-name { font-size: 2rem; }
  .piece-row { grid-template-columns: 36px 1fr 20px; gap: 0 1rem; }
  .reader-title { font-size: 2.1rem; }
  .prose, .prose-rich { font-size: 1rem; }
}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-rule"></div>
  <h1 class="site-name">Leo Vassiliou</h1>
  <p class="site-tagline">Collected writings</p>
</header>

<main class="wrap">

  <!-- INDEX -->
  <div id="indexView">
    <div class="index-meta" id="indexMeta">Loading…</div>
    <ul class="piece-list" id="pieceList">
      <li class="state-msg" id="loadingMsg">Loading writings…</li>
    </ul>
  </div>

  <!-- READER -->
  <div id="readerView">
    <div class="reader-top">
      <button class="back" id="backBtn">All writings</button>
      <div class="reader-n" id="readerN"></div>
      <h2 class="reader-title" id="readerTitle"></h2>
    </div>
    <div id="readerBody"></div>
  </div>

</main>

<footer>leovassiliou.co.uk</footer>

<!-- mammoth already loaded in <head> -->
<script>
// ═══════════════════════════════════════════════════════
//  CONFIG — set the path to your writings folder
// ═══════════════════════════════════════════════════════
const WRITINGS_PATH = './writings/';

// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
let pieces = [];      // { filename, title, type }
let currentIdx = null;

// ═══════════════════════════════════════════════════════
//  BOOT — load manifest, build index
// ═══════════════════════════════════════════════════════
async function init() {
  try {
    const res = await fetch(WRITINGS_PATH + 'manifest.json');
    if (!res.ok) throw new Error('manifest not found');
    const files = await res.json();

    pieces = files.map(filename => ({
      filename,
      title: filenameToTitle(filename),
      type:  filename.toLowerCase().endsWith('.docx') ? 'docx' : 'text'
    }));

    renderIndex();
  } catch(e) {
    document.getElementById('loadingMsg').textContent =
      'Could not load writings. Make sure manifest.json exists in the writings/ folder.';
    document.getElementById('indexMeta').textContent = '';
  }
}

// ═══════════════════════════════════════════════════════
//  INDEX
// ═══════════════════════════════════════════════════════
function renderIndex() {
  const list = document.getElementById('pieceList');
  const meta = document.getElementById('indexMeta');
  meta.textContent = pieces.length === 1 ? '1 piece' : `${pieces.length} pieces`;
  list.innerHTML = '';

  if (pieces.length === 0) {
    list.innerHTML = '<li class="state-msg">No writings yet.</li>';
    return;
  }

  pieces.forEach((p, i) => {
    const li = document.createElement('li');
    li.className = 'piece-row';
    li.setAttribute('role', 'button');
    li.setAttribute('tabindex', '0');
    li.innerHTML = `
      <span class="piece-n">${String(i+1).padStart(2,'0')}</span>
      <div class="piece-info">
        <div class="piece-title">${esc(p.title)}</div>
        <div class="piece-type">${p.type === 'docx' ? 'Word document' : 'Essay'}</div>
      </div>
      <span class="arrow">→</span>`;
    li.addEventListener('click', () => openReader(i));
    li.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') openReader(i); });
    list.appendChild(li);
  });
}

// ═══════════════════════════════════════════════════════
//  READER
// ═══════════════════════════════════════════════════════
async function openReader(idx) {
  currentIdx = idx;
  const p = pieces[idx];

  document.getElementById('readerN').textContent = `No. ${String(idx+1).padStart(2,'0')}`;
  document.getElementById('readerTitle').textContent = p.title;
  document.getElementById('readerBody').innerHTML =
    '<div class="reader-loading">Loading…</div>';

  document.getElementById('indexView').style.display = 'none';
  document.getElementById('readerView').style.display = 'block';
  window.scrollTo(0,0);

  // Update browser URL without reload (nice for sharing/bookmarking)
  history.pushState({ idx }, '', '#' + encodeURIComponent(p.title));

  try {
    const url = WRITINGS_PATH + encodeURIComponent(p.filename);
    const res = await fetch(url);
    if (!res.ok) throw new Error('fetch failed');

    if (p.type === 'docx') {
      const arrayBuffer = await res.arrayBuffer();
      const result = await mammoth.convertToHtml(
        { arrayBuffer },
        {
          styleMap: [
            "p[style-name='Section Title'] => h2",
            "p[style-name='Subsection Title'] => h3",
            "b => strong",
            "i => em"
          ]
        }
      );
      const bodyEl = document.getElementById('readerBody');
      bodyEl.className = 'prose-rich';
      bodyEl.innerHTML = cleanHtml(result.value);
    } else {
      const text = await res.text();
      const bodyEl = document.getElementById('readerBody');
      bodyEl.className = 'prose';
      const paras = text.split(/\n\s*\n/).filter(s => s.trim());
      bodyEl.innerHTML = paras.map(p => `<p>${esc(p.trim())}</p>`).join('');
    }
  } catch(e) {
    document.getElementById('readerBody').innerHTML =
      '<div class="reader-loading">Could not load this piece.</div>';
  }
}

function closeReader() {
  document.getElementById('readerView').style.display = 'none';
  document.getElementById('indexView').style.display = 'block';
  history.pushState({}, '', window.location.pathname);
  window.scrollTo(0,0);
}

// ═══════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════
function filenameToTitle(filename) {
  // Strip extension, convert underscores/hyphens to spaces, trim
  return filename
    .replace(/\.(docx|txt|md)$/i, '')
    .replace(/[_]/g, ' ')
    .trim();
}

function cleanHtml(html) {
  // Remove empty paragraphs that mammoth sometimes emits
  return html
    .replace(/<p>\s*<\/p>/g, '')
    .replace(/<p><br\s*\/?><\/p>/g, '');
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ═══════════════════════════════════════════════════════
//  EVENTS
// ═══════════════════════════════════════════════════════
document.getElementById('backBtn').addEventListener('click', closeReader);

// Handle browser back button
window.addEventListener('popstate', (e) => {
  if (e.state && typeof e.state.idx === 'number') {
    openReader(e.state.idx);
  } else {
    closeReader();
  }
});

// Deep-link on load (e.g. if someone shares a URL with a hash)
window.addEventListener('load', () => {
  init().then(() => {
    const hash = decodeURIComponent(location.hash.slice(1));
    if (hash) {
      const idx = pieces.findIndex(p => p.title === hash);
      if (idx !== -1) openReader(idx);
    }
  });
});
</script>
</body>
</html>
