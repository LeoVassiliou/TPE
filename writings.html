<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Writings</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1714;
    --ink-muted: #6b6560;
    --ink-faint: #c4bfb8;
    --parchment: #faf8f4;
    --parchment-dark: #f0ece4;
    --gold: #b8914a;
    --gold-light: #d4a96a;
    --rule: #ddd8cf;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --body: 'Crimson Pro', Georgia, serif;
    --sans: 'Raleway', sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --ink: #ede9e1;
      --ink-muted: #9b9590;
      --ink-faint: #4a4540;
      --parchment: #191815;
      --parchment-dark: #211f1b;
      --gold: #c8a05a;
      --gold-light: #d4a96a;
      --rule: #2e2c27;
    }
  }

  html { font-size: 18px; }
  body {
    background: var(--parchment);
    color: var(--ink);
    font-family: var(--body);
    font-weight: 400;
    line-height: 1.8;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    text-align: center;
    padding: 5rem 2rem 3rem;
    border-bottom: 1px solid var(--rule);
    position: relative;
  }
  header::before {
    content: '';
    display: block;
    width: 1px;
    height: 3rem;
    background: var(--gold);
    margin: 0 auto 2rem;
    opacity: 0.6;
  }
  .site-title {
    font-family: var(--serif);
    font-weight: 300;
    font-size: 2.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink);
  }
  .site-subtitle {
    font-family: var(--sans);
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-top: 0.75rem;
    font-weight: 400;
  }

  /* LAYOUT */
  .container { max-width: 1100px; margin: 0 auto; padding: 0 2rem; }

  /* VIEW TOGGLE */
  .controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 2rem 0 1.5rem;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 3rem;
  }
  .controls-label {
    font-family: var(--sans);
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--ink-muted);
  }
  .view-toggle {
    display: flex;
    gap: 0.5rem;
  }
  .view-btn {
    background: none;
    border: 1px solid var(--rule);
    color: var(--ink-muted);
    cursor: pointer;
    padding: 0.3rem 0.9rem;
    font-family: var(--sans);
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .view-btn.active {
    background: var(--gold);
    border-color: var(--gold);
    color: white;
  }
  .view-btn:hover:not(.active) {
    border-color: var(--gold);
    color: var(--gold);
  }

  /* INDEX / LIST VIEW */
  .index-view { display: block; }
  .reader-view { display: none; }

  .piece-list { list-style: none; }
  .piece-item {
    display: grid;
    grid-template-columns: 60px 1fr auto;
    align-items: baseline;
    gap: 0 2rem;
    padding: 1.4rem 0;
    border-bottom: 1px solid var(--rule);
    cursor: pointer;
    transition: all 0.2s;
  }
  .piece-item:hover .piece-title { color: var(--gold); }
  .piece-item:hover .piece-arrow { opacity: 1; transform: translateX(4px); }

  .piece-num {
    font-family: var(--serif);
    font-size: 0.75rem;
    color: var(--ink-faint);
    letter-spacing: 0.1em;
    font-weight: 300;
    font-style: italic;
  }
  .piece-info { min-width: 0; }
  .piece-title {
    font-family: var(--serif);
    font-size: 1.25rem;
    font-weight: 400;
    color: var(--ink);
    transition: color 0.2s;
    line-height: 1.4;
  }
  .piece-excerpt {
    font-size: 0.85rem;
    color: var(--ink-muted);
    margin-top: 0.3rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .piece-arrow {
    font-size: 1.2rem;
    color: var(--gold);
    opacity: 0;
    transition: all 0.2s;
  }

  /* ADD NEW BUTTON */
  .add-btn {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin: 2.5rem auto 5rem;
    background: none;
    border: 1px solid var(--rule);
    color: var(--ink-muted);
    cursor: pointer;
    padding: 0.9rem 2rem;
    font-family: var(--sans);
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    transition: all 0.25s;
    width: 100%;
    justify-content: center;
  }
  .add-btn:hover {
    border-color: var(--gold);
    color: var(--gold);
    background: color-mix(in srgb, var(--gold) 4%, transparent);
  }
  .add-btn .plus { font-size: 1.1rem; line-height: 1; }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(10,9,8,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    backdrop-filter: blur(2px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--parchment);
    border: 1px solid var(--rule);
    width: 100%;
    max-width: 640px;
    padding: 2.5rem;
    position: relative;
  }
  .modal-title {
    font-family: var(--serif);
    font-size: 1.4rem;
    font-weight: 400;
    margin-bottom: 1.5rem;
    color: var(--ink);
  }
  .modal label {
    display: block;
    font-family: var(--sans);
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-bottom: 0.4rem;
    margin-top: 1.2rem;
  }
  .modal label:first-of-type { margin-top: 0; }
  .modal input, .modal textarea {
    width: 100%;
    background: var(--parchment-dark);
    border: 1px solid var(--rule);
    color: var(--ink);
    font-family: var(--body);
    font-size: 1rem;
    padding: 0.6rem 0.8rem;
    outline: none;
    transition: border-color 0.2s;
    resize: vertical;
  }
  .modal input:focus, .modal textarea:focus {
    border-color: var(--gold);
  }
  .modal textarea { min-height: 200px; line-height: 1.7; }
  .modal-hint {
    font-size: 0.8rem;
    color: var(--ink-muted);
    margin-top: 0.35rem;
    font-style: italic;
  }
  .modal-actions {
    display: flex;
    gap: 1rem;
    margin-top: 1.8rem;
    justify-content: flex-end;
  }
  .modal-cancel {
    background: none;
    border: 1px solid var(--rule);
    color: var(--ink-muted);
    cursor: pointer;
    padding: 0.6rem 1.4rem;
    font-family: var(--sans);
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .modal-cancel:hover { border-color: var(--ink-muted); color: var(--ink); }
  .modal-save {
    background: var(--gold);
    border: 1px solid var(--gold);
    color: white;
    cursor: pointer;
    padding: 0.6rem 1.4rem;
    font-family: var(--sans);
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .modal-save:hover { background: var(--gold-light); border-color: var(--gold-light); }
  .modal-close {
    position: absolute;
    top: 1.2rem; right: 1.2rem;
    background: none; border: none;
    color: var(--ink-muted);
    cursor: pointer;
    font-size: 1.3rem;
    line-height: 1;
    transition: color 0.2s;
  }
  .modal-close:hover { color: var(--ink); }

  /* READER VIEW */
  .reader-header {
    padding: 4rem 0 2.5rem;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 0;
  }
  .back-btn {
    background: none;
    border: none;
    color: var(--ink-muted);
    cursor: pointer;
    font-family: var(--sans);
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 0;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    transition: color 0.2s;
    margin-bottom: 2.5rem;
  }
  .back-btn:hover { color: var(--gold); }
  .back-btn::before { content: '←'; font-size: 1rem; font-family: serif; }

  .reader-num {
    font-family: var(--serif);
    font-style: italic;
    font-size: 0.85rem;
    color: var(--gold);
    margin-bottom: 0.75rem;
    letter-spacing: 0.05em;
  }
  .reader-title {
    font-family: var(--serif);
    font-weight: 300;
    font-size: 3rem;
    line-height: 1.15;
    color: var(--ink);
    max-width: 700px;
    margin-bottom: 2rem;
  }

  /* PROSE */
  .prose {
    max-width: 660px;
    padding: 3.5rem 0 6rem;
    font-family: var(--body);
    font-size: 1.1rem;
    line-height: 1.85;
    color: var(--ink);
  }
  .prose p {
    margin-bottom: 1.5em;
  }
  .prose p:last-child { margin-bottom: 0; }

  /* ORNAMENT between sections */
  .ornament {
    text-align: center;
    color: var(--gold);
    opacity: 0.5;
    letter-spacing: 0.5em;
    margin: 1em 0;
    font-size: 0.7rem;
  }

  /* FOOTER */
  footer {
    border-top: 1px solid var(--rule);
    text-align: center;
    padding: 2.5rem;
    font-family: var(--sans);
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 5rem 2rem;
    color: var(--ink-muted);
  }
  .empty-state p {
    font-family: var(--serif);
    font-size: 1.2rem;
    font-style: italic;
    font-weight: 300;
  }

  /* DELETE BUTTON IN READER */
  .reader-actions {
    display: flex;
    gap: 1rem;
    align-items: center;
    margin-top: 1rem;
  }
  .edit-btn, .delete-btn {
    background: none;
    border: 1px solid var(--rule);
    cursor: pointer;
    padding: 0.35rem 0.9rem;
    font-family: var(--sans);
    font-size: 0.55rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .edit-btn { color: var(--ink-muted); }
  .edit-btn:hover { border-color: var(--gold); color: var(--gold); }
  .delete-btn { color: var(--ink-faint); }
  .delete-btn:hover { border-color: #c0392b; color: #c0392b; }

  @media (max-width: 600px) {
    html { font-size: 16px; }
    .piece-item { grid-template-columns: 40px 1fr auto; gap: 0 1rem; }
    .reader-title { font-size: 2rem; }
    .prose { font-size: 1rem; }
  }
</style>
</head>
<body>

<header>
  <h1 class="site-title">Notes</h1>
  <p class="site-subtitle">Collected writings</p>
</header>

<main class="container">

  <!-- INDEX VIEW -->
  <div class="index-view" id="indexView">
    <div class="controls">
      <span class="controls-label" id="piece-count">Loading…</span>
    </div>
    <ul class="piece-list" id="pieceList">
      <!-- pieces rendered here -->
    </ul>
    <div class="empty-state" id="emptyState" style="display:none;">
      <p>No writings yet — add your first piece below.</p>
    </div>
    <button class="add-btn" id="addBtn">
      <span class="plus">+</span> Add a new piece
    </button>
  </div>

  <!-- READER VIEW -->
  <div class="reader-view" id="readerView">
    <div class="reader-header">
      <button class="back-btn" id="backBtn">All writings</button>
      <div class="reader-num" id="readerNum"></div>
      <h2 class="reader-title" id="readerTitle"></h2>
      <div class="reader-actions">
        <button class="edit-btn" id="editBtn">Edit</button>
        <button class="delete-btn" id="deleteBtn">Delete</button>
      </div>
    </div>
    <div class="prose" id="readerBody"></div>
  </div>

</main>

<!-- ADD / EDIT MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" role="dialog" aria-modal="true">
    <button class="modal-close" id="modalClose" aria-label="Close">✕</button>
    <h3 class="modal-title" id="modalHeading">New piece</h3>
    <label for="titleInput">Title</label>
    <input type="text" id="titleInput" placeholder="Give it a title…">
    <label for="bodyInput">Text</label>
    <textarea id="bodyInput" placeholder="Paste your writing here…"></textarea>
    <p class="modal-hint">Blank lines will become paragraph breaks.</p>
    <div class="modal-actions">
      <button class="modal-cancel" id="modalCancel">Cancel</button>
      <button class="modal-save" id="modalSave">Save</button>
    </div>
  </div>
</div>

<footer>
  <p>Written by hand, gathered here.</p>
</footer>

<script>
const STORAGE_KEY = 'writings_v1';

// ── Seed data ────────────────────────────────────────────────────────────────
const SEED = [
  {
    id: Date.now(),
    title: "Forests, Deserts, and Lumberjacks",
    body: `It is only those who could forgive Hitler that could beat him. Forgiveness is far stronger than hatred. No war can be won with hatred, no battle even. Any battle founded on hate ends with two losers. But any battle founded on love ends with two winners. You might say, "What about hatred for sin? We are called to love people and hate sin. We should fight against it." Ye never said a truer word. However, such battles may be fuelled with a hatred for sin, but they are founded on love for the sinner. We ought not to hate sin for its own sake. We ought to hate sin because of what it does to those we love. Because we ought to love and want the best for people, we ought to hate that which ruins them. Those who do not have it in them to love and forgive their enemy cannot have it in them to truly and fully love and forgive even their neighbour.

Evil is a privation of the good. Hate is evil. Love is good. We must therefore accept hate is merely a privation of love. What the world calls hatred is really apathy, a mere privation of love. But what the world calls apathy, that is true hatred. Hitler did not hate too much. Hitler loved too little. Hatred is born of apathy, not the other way around. That privation of love, that seed of "nothingness", if left to itself, will sprout and grow into a tree of hatred. A tree with no mass, no energy, no visibility. It does not exist. But it does have an effect. And its effects are devastating.

How are we to understand this? We have been given the perfect analogy in our world: the shadow. The shadow does not exist; it is a mere privation of light. But shadows are dark, scary, gloomy, depressing, obtrusive. Shadows are many things, but a thing itself is not one of them. Children are not scared of the dark, for the dark is nothing and nothing comes from it; they are scared of the absence of light. It is not that a child fears a monster will be summoned from the darkness, but that they fear a monster is already there, and they desire nothing more than the light to banish or expose it.

The solution to the trembling child is not to defeat the dark, but to turn on the light. For the light overcomes the darkness, but the darkness cannot overcome the light. It would have to exist to do that. The problem is not that the child ought not be scared of the light, for deep down he is not; deep down he is appropriately desiring the light. The problem is the lack of light. Where there is not light without, there shall be light within. For the light of the world is not content in merely radiating some of his light for us to occasionally glance at. No, he insists on living within us. It will not do for us to be content with a night light; we must be overflowing with light from within. We must be the light of the world, and we ought to let our light shine among others.

We are all called for this, we all have the potential for this, most of all children. But children are not raised with this in mind. The world seems to think hatred a thing in itself, and apathy a mere delusion. The world will not be content until it has taught each and every child to be so concerned with something that does not exist that they come to believe darkness is true reality and light was the mere delusion. The task of the modern educator is not to cut down forests, but to irrigate deserts. How much more is this true if there are no trees to be cut down, and infinite deserts to irrigate!

How are we to be surprised when we find aspiring lumberjacks in a world with no need of cutting anything down? He is to be a cultivator of the most beautiful of deserts: himself. He can still be at any moment. But we cannot be surprised when we face a world with such people; we have made it so. We can either fix it or face the consequences. And no one who knows anything of history will not know of how dire the consequences are.

We promise generations that if only they were to become lumberjacks, they will be given forests to cut down. If we inspire in them a desire for cutting down in a world with no forests, how can we be surprised when they turn to people instead? As a thirsty man in the desert mistakes the sand for water, so does the bloodthirsty lumberjack mistake the people for trees.

Hitler did not start out with a hatred for people. Hitler started out with a hatred for the destruction of his country, disguised as a love and passion for the good of his country. He had been given the axe and told to aim for the trees. But there are none; there never have been. The appropriate reaction here is to realise you aren't meant to be a lumberjack but a cultivator. It is good that one should love his country. It is bad and mistaken to think the way to help it is not to irrigate deserts but to cut down forests.

Of course, the wrong reaction to one finding out there are no forests to cut down is to hallucinate them. So desperate to find something to cut down, everything begins to look a lot like trees. These people are the problem, and those people are the problem, and these things are all the problems. No, if we are to take our ideas seriously and to their conclusions, then there are no problems, not really. Only shadows.

We have seen that the solution to the child's fear of the dark is not conflict with the dark but relationship with the light. The same principle is alive here. Focus on the dark and it will only grow. Focus on the light, so much that we are overflowing with it, and there is no room for darkness.

This is yet another of the many reasons why monotheism is so revolutionary an idea for a society and the reason for the turning point of human history. We can either focus on the innumerable problems, shadows, and monsters of the dark in this world, prioritising their destruction, or we can focus on the sole light of the world, who, given our permission, can shine so bright within and without that it is as if there was never any darkness. A world full of light. A world aimed up.

Seek first his kingdom and his righteousness, and all these things will be given to you as well. Look how much the pockets of light in the world throughout history have achieved (and facing much harder problems). Imagine how much more we could all do now, if only we let our light shine.

But we must first invite the light within; it is not within us by default. It is not natural. It is in fact very unnatural, supernatural even. It will hurt, for we are lovers of our own pockets of darkness within, and the light will make it as if it had never existed. But we must let it. We must not think that we can truly and fully have the light of the world dwelling within us and still manage to keep our favourite areas of darkness here and there where we want. No, it must all go. Light is not discriminatory; it will overcome all, even that which we so desperately cling to.

But we must let it happen. We were not made to be a decent house, but a glorious mansion. We were not made for a reasonable amount of happiness and the rest filled with whatever we want. We were made for infinite joy, and we can invite it in at any moment. We were not made to sail the seas; we were made to walk them.

It is time we step out of our boats into the water; it is scary indeed. You may even sink a little. But all we must do is focus on the shining hand reaching out into the water, and we will be pulled up. The waves will calm, for the problems were never comparable to the solution. And we will not sink, not because the waves have calmed, but because the water has dried up. We are left facing a desert, and we have a job to do.`
  }
];

// ── State ────────────────────────────────────────────────────────────────────
let pieces = [];
let currentId = null;
let editingId = null;

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    pieces = raw ? JSON.parse(raw) : null;
    if (!pieces) { pieces = SEED; save(); }
  } catch(e) { pieces = SEED; }
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(pieces));
}

// ── Render index ─────────────────────────────────────────────────────────────
function renderIndex() {
  const list = document.getElementById('pieceList');
  const empty = document.getElementById('emptyState');
  const count = document.getElementById('piece-count');

  list.innerHTML = '';
  count.textContent = pieces.length === 1 ? '1 piece' : `${pieces.length} pieces`;

  if (pieces.length === 0) {
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  pieces.forEach((p, i) => {
    const excerpt = p.body.replace(/\n+/g, ' ').slice(0, 80).trim() + '…';
    const li = document.createElement('li');
    li.className = 'piece-item';
    li.innerHTML = `
      <span class="piece-num">${String(i + 1).padStart(2, '0')}</span>
      <div class="piece-info">
        <div class="piece-title">${escHtml(p.title)}</div>
        <div class="piece-excerpt">${escHtml(excerpt)}</div>
      </div>
      <span class="piece-arrow">→</span>
    `;
    li.addEventListener('click', () => openReader(p.id));
    list.appendChild(li);
  });
}

// ── Reader ───────────────────────────────────────────────────────────────────
function openReader(id) {
  currentId = id;
  const p = pieces.find(x => x.id === id);
  const idx = pieces.indexOf(p);

  document.getElementById('readerNum').textContent = `No. ${String(idx + 1).padStart(2, '0')}`;
  document.getElementById('readerTitle').textContent = p.title;

  const bodyEl = document.getElementById('readerBody');
  const paras = p.body.split(/\n\s*\n/).filter(Boolean);
  bodyEl.innerHTML = paras.map(para => `<p>${escHtml(para.trim())}</p>`).join('');

  document.getElementById('indexView').style.display = 'none';
  const rv = document.getElementById('readerView');
  rv.style.display = 'block';
  window.scrollTo(0, 0);
}

function closeReader() {
  document.getElementById('indexView').style.display = 'block';
  document.getElementById('readerView').style.display = 'none';
  renderIndex();
}

// ── Modal ────────────────────────────────────────────────────────────────────
function openModal(id = null) {
  editingId = id;
  const modal = document.getElementById('modalOverlay');
  const heading = document.getElementById('modalHeading');
  const titleIn = document.getElementById('titleInput');
  const bodyIn = document.getElementById('bodyInput');

  if (id) {
    const p = pieces.find(x => x.id === id);
    heading.textContent = 'Edit piece';
    titleIn.value = p.title;
    bodyIn.value = p.body;
  } else {
    heading.textContent = 'New piece';
    titleIn.value = '';
    bodyIn.value = '';
  }
  modal.classList.add('open');
  titleIn.focus();
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  editingId = null;
}

function saveModal() {
  const title = document.getElementById('titleInput').value.trim();
  const body = document.getElementById('bodyInput').value.trim();
  if (!title || !body) { alert('Please fill in both the title and the text.'); return; }

  if (editingId) {
    const p = pieces.find(x => x.id === editingId);
    p.title = title;
    p.body = body;
    save();
    closeModal();
    if (currentId === editingId) openReader(editingId);
    else renderIndex();
  } else {
    pieces.push({ id: Date.now(), title, body });
    save();
    closeModal();
    renderIndex();
  }
}

function deletePiece(id) {
  if (!confirm('Delete this piece? This cannot be undone.')) return;
  pieces = pieces.filter(x => x.id !== id);
  save();
  closeReader();
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Events ───────────────────────────────────────────────────────────────────
document.getElementById('backBtn').addEventListener('click', closeReader);
document.getElementById('addBtn').addEventListener('click', () => openModal());
document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalCancel').addEventListener('click', closeModal);
document.getElementById('modalSave').addEventListener('click', saveModal);
document.getElementById('editBtn').addEventListener('click', () => openModal(currentId));
document.getElementById('deleteBtn').addEventListener('click', () => deletePiece(currentId));

document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// ── Boot ─────────────────────────────────────────────────────────────────────
load();
renderIndex();
</script>
</body>
</html>
