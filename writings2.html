<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Writings</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  /* Keep all your existing CSS styles - they're perfect */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1714;
    --ink-muted: #6b6560;
    --ink-faint: #c4bfb8;
    --parchment: #faf8f4;
    --parchment-dark: #f0ece4;
    --gold: #b8914a;
    --gold-light: #d4a96a;
    --rule: #ddd8cf;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --body: 'Crimson Pro', Georgia, serif;
    --sans: 'Raleway', sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --ink: #ede9e1;
      --ink-muted: #9b9590;
      --ink-faint: #4a4540;
      --parchment: #191815;
      --parchment-dark: #211f1b;
      --gold: #c8a05a;
      --gold-light: #d4a96a;
      --rule: #2e2c27;
    }
  }

  html { font-size: 18px; }
  body {
    background: var(--parchment);
    color: var(--ink);
    font-family: var(--body);
    font-weight: 400;
    line-height: 1.8;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    text-align: center;
    padding: 5rem 2rem 3rem;
    border-bottom: 1px solid var(--rule);
    position: relative;
  }
  header::before {
    content: '';
    display: block;
    width: 1px;
    height: 3rem;
    background: var(--gold);
    margin: 0 auto 2rem;
    opacity: 0.6;
  }
  .site-title {
    font-family: var(--serif);
    font-weight: 300;
    font-size: 2.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink);
  }
  .site-subtitle {
    font-family: var(--sans);
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-top: 0.75rem;
    font-weight: 400;
  }

  /* LAYOUT */
  .container { max-width: 1100px; margin: 0 auto; padding: 0 2rem; }

  /* CONTROLS */
  .controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 2rem 0 1.5rem;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 3rem;
  }
  .controls-label {
    font-family: var(--sans);
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--ink-muted);
  }

  /* INDEX / LIST VIEW */
  .index-view { display: block; }
  .reader-view { display: none; }

  .piece-list { list-style: none; }
  .piece-item {
    display: grid;
    grid-template-columns: 60px 1fr auto;
    align-items: baseline;
    gap: 0 2rem;
    padding: 1.4rem 0;
    border-bottom: 1px solid var(--rule);
    cursor: pointer;
    transition: all 0.2s;
  }
  .piece-item:hover .piece-title { color: var(--gold); }
  .piece-item:hover .piece-arrow { opacity: 1; transform: translateX(4px); }

  .piece-num {
    font-family: var(--serif);
    font-size: 0.75rem;
    color: var(--ink-faint);
    letter-spacing: 0.1em;
    font-weight: 300;
    font-style: italic;
  }
  .piece-info { min-width: 0; }
  .piece-title {
    font-family: var(--serif);
    font-size: 1.25rem;
    font-weight: 400;
    color: var(--ink);
    transition: color 0.2s;
    line-height: 1.4;
  }
  .piece-excerpt {
    font-size: 0.85rem;
    color: var(--ink-muted);
    margin-top: 0.3rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .piece-arrow {
    font-size: 1.2rem;
    color: var(--gold);
    opacity: 0;
    transition: all 0.2s;
  }

  /* READER VIEW */
  .back-btn {
    background: none;
    border: none;
    color: var(--ink-muted);
    cursor: pointer;
    font-family: var(--sans);
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 0;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    transition: color 0.2s;
    margin-bottom: 2.5rem;
  }
  .back-btn:hover { color: var(--gold); }
  .back-btn::before { content: '←'; font-size: 1rem; font-family: serif; }

  .reader-header {
    padding: 4rem 0 2.5rem;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 0;
  }

  .reader-num {
    font-family: var(--serif);
    font-style: italic;
    font-size: 0.85rem;
    color: var(--gold);
    margin-bottom: 0.75rem;
    letter-spacing: 0.05em;
  }
  .reader-title {
    font-family: var(--serif);
    font-weight: 300;
    font-size: 3rem;
    line-height: 1.15;
    color: var(--ink);
    max-width: 700px;
    margin-bottom: 2rem;
  }

  /* ENHANCED PROSE for Word Document formatting */
  .prose {
    max-width: 660px;
    padding: 3.5rem 0 6rem;
    font-family: var(--body);
    font-size: 1.1rem;
    line-height: 1.85;
    color: var(--ink);
  }
  .prose p {
    margin-bottom: 1.5em;
  }
  .prose p:last-child { margin-bottom: 0; }

  /* Word document formatting styles */
  .prose h1, .prose h2, .prose h3, .prose h4, .prose h5, .prose h6 {
    font-family: var(--serif);
    color: var(--ink);
    margin: 2em 0 1em 0;
    line-height: 1.3;
  }
  .prose h1 { font-size: 2.2em; font-weight: 300; }
  .prose h2 { font-size: 1.8em; font-weight: 400; }
  .prose h3 { font-size: 1.5em; font-weight: 400; }
  .prose h4 { font-size: 1.3em; font-weight: 500; }
  .prose h5 { font-size: 1.1em; font-weight: 500; }
  .prose h6 { font-size: 1em; font-weight: 600; }

  .prose strong, .prose b { font-weight: 600; color: var(--ink); }
  .prose em, .prose i { font-style: italic; }
  .prose u { text-decoration: underline; }

  .prose ul, .prose ol {
    margin: 1.5em 0;
    padding-left: 2em;
  }
  .prose li {
    margin-bottom: 0.5em;
  }
  .prose ul { list-style-type: disc; }
  .prose ol { list-style-type: decimal; }

  .prose blockquote {
    border-left: 3px solid var(--gold);
    padding-left: 1.5em;
    margin: 2em 0;
    font-style: italic;
    color: var(--ink-muted);
  }

  /* FOOTER */
  footer {
    border-top: 1px solid var(--rule);
    text-align: center;
    padding: 2.5rem;
    font-family: var(--sans);
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 5rem 2rem;
    color: var(--ink-muted);
  }
  .empty-state p {
    font-family: var(--serif);
    font-size: 1.2rem;
    font-style: italic;
    font-weight: 300;
  }

  @media (max-width: 600px) {
    html { font-size: 16px; }
    .piece-item { grid-template-columns: 40px 1fr auto; gap: 0 1rem; }
    .reader-title { font-size: 2rem; }
    .prose { font-size: 1rem; }
  }
</style>
</head>
<body>

<header>
  <h1 class="site-title">Notes</h1>
  <p class="site-subtitle">Collected writings</p>
</header>

<main class="container">

  <!-- INDEX VIEW -->
  <div class="index-view" id="indexView">
    <div class="controls">
      <span class="controls-label" id="piece-count">Loading…</span>
    </div>
    <ul class="piece-list" id="pieceList">
      <!-- pieces rendered here -->
    </ul>
    <div class="empty-state" id="emptyState" style="display:none;">
      <p>No writings available.</p>
    </div>
  </div>

  <!-- READER VIEW -->
  <div class="reader-view" id="readerView">
    <div class="reader-header">
      <button class="back-btn" id="backBtn">All writings</button>
      <div class="reader-num" id="readerNum"></div>
      <h2 class="reader-title" id="readerTitle"></h2>
    </div>
    <div class="prose" id="readerBody"></div>
  </div>

</main>

<footer>
  <p>Written by hand, gathered here.</p>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.2/mammoth.browser.min.js"></script>
<script>
// ── Configuration ────────────────────────────────────────────────────────────
const WRITINGS_FOLDER = './writings/'; // Path to your writings folder

// ── State ────────────────────────────────────────────────────────────────────
let pieces = [];
let currentId = null;

// ── File List (Update this when you add new files) ─────────────────────────────
const fileList = [
  { filename: 'Forests, Deserts, and Lumberjacks.txt', title: 'Forests, Deserts, and Lumberjacks' },
  { filename: '1 Hour Talk.docx', title: 'Talk' }
];

// ── File Loading Functions ──────────────────────────────────────────────────
async function loadTextFile(filename) {
  try {
    const response = await fetch(WRITINGS_FOLDER + filename);
    const text = await response.text();
    return text.split(/\n\s*\n/).filter(Boolean)
      .map(para => `<p>${escHtml(para.trim())}</p>`)
      .join('');
  } catch (error) {
    console.error('Error loading text file:', error);
    return '<p>Error loading this writing.</p>';
  }
}

async function loadWordFile(filename) {
  try {
    const response = await fetch(WRITINGS_FOLDER + filename);
    const arrayBuffer = await response.arrayBuffer();

    const result = await mammoth.convertToHtml({arrayBuffer: arrayBuffer});
    return cleanWordHtml(result.html);
  } catch (error) {
    console.error('Error loading Word file:', error);
    return '<p>Error loading this writing.</p>';
  }
}

function cleanWordHtml(html) {
  // Clean up Word HTML
  return html
    .replace(/<p[^>]*>\s*<\/p>/gi, '') // Remove empty paragraphs
    .replace(/<span[^>]*>(.*?)<\/span>/gi, '$1') // Remove unnecessary spans
    .replace(/style="[^"]*"/gi, '') // Remove inline styles
    .replace(/class="[^"]*"/gi, ''); // Remove classes
}

// ── Initialize Pieces ───────────────────────────────────────────────────────
async function initializePieces() {
  pieces = [];

  for (let i = 0; i < fileList.length; i++) {
    const file = fileList[i];
    const id = i + 1;

    pieces.push({
      id: id,
      title: file.title,
      filename: file.filename,
      body: null // Will be loaded when needed
    });
  }

  renderIndex();
}

// ── Render Functions ────────────────────────────────────────────────────────
function renderIndex() {
  const list = document.getElementById('pieceList');
  const empty = document.getElementById('emptyState');
  const count = document.getElementById('piece-count');

  list.innerHTML = '';
  count.textContent = pieces.length === 1 ? '1 piece' : `${pieces.length} pieces`;

  if (pieces.length === 0) {
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  pieces.forEach((p, i) => {
    const excerpt = `Click to read ${p.filename.endsWith('.docx') || p.filename.endsWith('.doc') ? 'Word document' : 'text file'}`;

    const li = document.createElement('li');
    li.className = 'piece-item';
    li.innerHTML = `
      <span class="piece-num">${String(i + 1).padStart(2, '0')}</span>
      <div class="piece-info">
        <div class="piece-title">${escHtml(p.title)}</div>
        <div class="piece-excerpt">${excerpt}</div>
      </div>
      <span class="piece-arrow">→</span>
    `;
    li.addEventListener('click', () => openReader(p.id));
    list.appendChild(li);
  });
}

async function openReader(id) {
  currentId = id;
  const p = pieces.find(x => x.id === id);
  const idx = pieces.indexOf(p);

  document.getElementById('readerNum').textContent = `No. ${String(idx + 1).padStart(2, '0')}`;
  document.getElementById('readerTitle').textContent = p.title;

  // Load content if not already loaded
  if (!p.body) {
    const bodyEl = document.getElementById('readerBody');
    bodyEl.innerHTML = '<p style="text-align: center; color: var(--ink-muted);">Loading...</p>';

    if (p.filename.endsWith('.txt')) {
      p.body = await loadTextFile(p.filename);
    } else if (p.filename.endsWith('.docx') || p.filename.endsWith('.doc')) {
      p.body = await loadWordFile(p.filename);
    }
  }

  document.getElementById('readerBody').innerHTML = p.body;

  document.getElementById('indexView').style.display = 'none';
  document.getElementById('readerView').style.display = 'block';
  window.scrollTo(0, 0);
}

function closeReader() {
  document.getElementById('indexView').style.display = 'block';
  document.getElementById('readerView').style.display = 'none';
}

// ── Utility Functions ───────────────────────────────────────────────────────
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Event Listeners ─────────────────────────────────────────────────────────
document.getElementById('backBtn').addEventListener('click', closeReader);

// ── Initialize ──────────────────────────────────────────────────────────────
initializePieces();
</script>
</body>
</html>
